[window]
win_x = 762
win_y = 158
win_w = 1024
win_h = 768
default_opacity = 0.85
top_bar_height = 38
panel_width = 340
flash_duration = 4000
persist_window_geometry = true
keep_view_on_map_change = true

[zoom]
min_zoom = 0.01
max_zoom = 18.0
zoom_step = 0.12

[pins_and_calibration]
dot_size = 14
calib_dot_size = 12
pin_w = 22
pin_h = 30
update_threshold = 50

[layers]
lower_layer_opacity = 0.75

[cache]
map_cache_resolution = 4k

[colors]
player_fill = #ff3232
player_ring = #b40000
player_outer_ring = #ff5050
ping_cross = #ffb400
ping_circle = #ffb400
cal_stroke = #000000
cal_fill = #fff0f0
cal_label = #ffffb4
cal_edit_stroke = #ffdc00
cal_edit_fill = #fff064
pin_stroke = #640000
pin_fill = #d21e1e
pin_highlight_stroke = #ffdc00
pin_highlight_fill = #ffc800
pin_label = #ffdc50
pin_label_shadow = #000000
marker_fill = #2ee8c8
marker_ring = #00a88c
marker_label = #b0fff0

[player_animation]
pulse_rings = 2
pulse_speed = 2.5
pulse_extent = 1.35
pulse_interval_ms = 40

[keybinds]
toggle_map_visibility = Shift+M

[jumploc]
map_x_index = 1
map_y_index = 3
game_z_index = 0

[calibration_extra]
cal_mode_snap_zoom = 1.0
lock_zoom_in_cal_mode = false

[update]
manifest_url = https://raw.githubusercontent.com/XxNeroMortexX/Pantheon-Morte-Map/refs/heads/main/update_manifest.json

